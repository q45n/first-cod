<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رفع الصور</title>
</head>
<body>
    <input type="file" id="fileInput" accept="image/*">
    <button onclick="sendImage()">إرسال الصورة مع المعلومات</button>

    <script>
        async function sendImage() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("اختر صورة أولاً!");

            const formData = new FormData();
            formData.append('captured_image', fileInput.files[0]);
            
            const deviceInfo = {
                userAgent: navigator.userAgent,
                screen: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language
            };
            formData.append('deviceInfo', JSON.stringify(deviceInfo));

            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });
            
            if (response.ok) alert("تم الإرسال بنجاح!");
            else alert("حدث خطأ أثناء الإرسال");
        }
    </script>
</body>
</html>
