<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .box { border: 1px solid #333; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        button { background: #6200ea; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>AI Photo Enhancer</h1>
        
        <!-- خيار الكاميرا الأصلي -->
        <h3>تصوير مباشر</h3>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
        <button onclick="upload('cameraInput')">التقاط ورفع</button>

        <hr>

        <!-- خيار اختيار 3 صور من الألبوم -->
        <h3>رفع من الألبوم (حتى 3 صور)</h3>
        <input type="file" id="albumInput" accept="image/*" multiple>
        <button onclick="uploadAlbum()">تحسين ورفع الصور</button>
        
        <p id="status"></p>
    </div>

    <script>
        // دالة الرفع الواحدة (للكاميرا)
        async function upload(inputId) {
            const input = document.getElementById(inputId);
            if (input.files.length === 0) return alert("اختر صورة!");
            const formData = new FormData();
            formData.append('captured_image', input.files[0]);
            await fetch('/api/upload', { method: 'POST', body: formData });
            alert("تم الإرسال!");
        }

        // دالة رفع 3 صور (للألبوم)
        async function uploadAlbum() {
            const files = document.getElementById('albumInput').files;
            if (files.length === 0 || files.length > 3) return alert("اختر من 1 إلى 3 صور فقط!");
            
            document.getElementById('status').innerText = "جاري التحسين...";
            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('captured_image', files[i]);
                await fetch('/api/upload', { method: 'POST', body: formData });
            }
            document.getElementById('status').innerText = "تم التحسين بنجاح!";
        }
    </script>
</body>
</html>
